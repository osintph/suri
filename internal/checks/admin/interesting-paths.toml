# Suri interesting-paths catalogue
# Hand-curated by OSINT-PH for Suri. Not derived from SecLists.
#
# Each entry is probed against the target. If the response is 200 and the
# body matches at least one content_pattern, a medium/firm or high/confirmed
# finding is emitted. If the response is 401/403/5xx, a firm finding is
# emitted at severity_if_protected (default: medium). 404 is always skipped.
#
# content_patterns use Go RE2 regex syntax. All patterns are compiled with
# (?m) multiline flag so ^ and $ match at line boundaries within the body.

[[paths]]
path = ".git/HEAD"
description = "Git repository HEAD reference"
content_patterns = ["^ref:\\s+refs/", "^[0-9a-f]{40}\\s*$"]

[[paths]]
path = ".git/config"
description = "Git repository configuration"
content_patterns = ["\\[core\\]", "\\[remote\\s+\"", "\\[branch\\s+\""]

[[paths]]
path = ".git/index"
description = "Git index file"
content_patterns = ["^DIRC"]

[[paths]]
path = ".env"
description = "Environment variable file"
content_patterns = ["^[A-Z_][A-Z0-9_]*\\s*=", "^export\\s+[A-Z_]"]

[[paths]]
path = ".env.local"
description = "Local environment variable file"
content_patterns = ["^[A-Z_][A-Z0-9_]*\\s*=", "^export\\s+[A-Z_]"]

[[paths]]
path = ".env.production"
description = "Production environment variable file"
content_patterns = ["^[A-Z_][A-Z0-9_]*\\s*=", "^export\\s+[A-Z_]"]

[[paths]]
path = ".env.backup"
description = "Environment variable backup file"
content_patterns = ["^[A-Z_][A-Z0-9_]*\\s*=", "^export\\s+[A-Z_]"]

[[paths]]
path = ".htpasswd"
description = "Apache password file"
content_patterns = ["^[A-Za-z0-9._-]+:\\$"]

[[paths]]
path = ".htaccess"
description = "Apache configuration override"
content_patterns = ["RewriteEngine", "AuthType", "Require\\s+(all|valid|user|group)", "Options\\s+(\\+|-)?(Indexes|FollowSymLinks|MultiViews)", "Order\\s+(allow|deny)"]

[[paths]]
path = ".DS_Store"
description = "macOS directory metadata"
content_patterns = ["^\\x00\\x00\\x00\\x01Bud1"]

[[paths]]
path = ".svn/entries"
description = "Subversion entries file"
content_patterns = ["dir\\s*$", "^\\d+\\s*$"]

[[paths]]
path = "composer.json"
description = "PHP Composer package manifest"
content_patterns = ["\"require\"\\s*:", "\"autoload\"\\s*:", "\"name\"\\s*:\\s*\""]

[[paths]]
path = "composer.lock"
description = "PHP Composer dependency lock file"
content_patterns = ["\"_readme\"", "\"content-hash\"", "\"packages\"\\s*:"]

[[paths]]
path = "package.json"
description = "Node.js package manifest"
content_patterns = ["\"dependencies\"\\s*:", "\"devDependencies\"\\s*:", "\"scripts\"\\s*:"]

[[paths]]
path = "yarn.lock"
description = "Yarn dependency lock file"
content_patterns = ["^# THIS IS AN AUTOGENERATED FILE", "^# yarn lockfile"]

[[paths]]
path = "Dockerfile"
description = "Docker container build instructions"
content_patterns = ["^FROM\\s+", "^RUN\\s+", "^CMD\\s+", "^ENTRYPOINT\\s+"]

[[paths]]
path = "docker-compose.yml"
description = "Docker Compose configuration"
content_patterns = ["^version\\s*:", "^services\\s*:", "^networks\\s*:", "^volumes\\s*:"]

[[paths]]
path = "docker-compose.yaml"
description = "Docker Compose configuration"
content_patterns = ["^version\\s*:", "^services\\s*:", "^networks\\s*:", "^volumes\\s*:"]

[[paths]]
path = "id_rsa"
description = "RSA private key file"
content_patterns = ["BEGIN\\s+(RSA\\s+)?PRIVATE KEY", "BEGIN\\s+OPENSSH PRIVATE KEY"]
severity_if_protected = "high"

[[paths]]
path = "id_dsa"
description = "DSA private key file"
content_patterns = ["BEGIN\\s+DSA PRIVATE KEY"]
severity_if_protected = "high"

[[paths]]
path = "id_ed25519"
description = "Ed25519 private key file"
content_patterns = ["BEGIN\\s+OPENSSH PRIVATE KEY"]
severity_if_protected = "high"

[[paths]]
path = "wp-config.php"
description = "WordPress configuration file"
content_patterns = ["<\\?php", "DB_NAME", "DB_PASSWORD", "AUTH_KEY"]

[[paths]]
path = "wp-config.php.bak"
description = "WordPress configuration backup"
content_patterns = ["<\\?php", "DB_NAME", "DB_PASSWORD", "AUTH_KEY"]

[[paths]]
path = "web.config"
description = "IIS application configuration"
content_patterns = ["<configuration", "<system\\.web", "<connectionStrings"]

[[paths]]
path = "web.config.bak"
description = "IIS configuration backup"
content_patterns = ["<configuration", "<system\\.web"]

[[paths]]
path = ".aws/credentials"
description = "AWS CLI credentials file"
content_patterns = ["aws_access_key_id\\s*=", "aws_secret_access_key\\s*=", "^\\[default\\]"]
severity_if_protected = "high"

[[paths]]
path = ".aws/config"
description = "AWS CLI configuration"
content_patterns = ["^region\\s*=", "^\\[profile\\s+", "^output\\s*="]

[[paths]]
path = ".ssh/authorized_keys"
description = "SSH authorized keys file"
content_patterns = ["^ssh-(rsa|dss|ed25519)\\s+", "^ecdsa-sha2-"]
severity_if_protected = "high"

[[paths]]
path = ".ssh/id_rsa"
description = "SSH private key (RSA)"
content_patterns = ["BEGIN\\s+(RSA\\s+)?PRIVATE KEY", "BEGIN\\s+OPENSSH PRIVATE KEY"]
severity_if_protected = "high"

[[paths]]
path = ".ssh/known_hosts"
description = "SSH known hosts file"
content_patterns = ["^[\\w.,*-]+\\s+(ssh-rsa|ssh-ed25519|ecdsa-)"]

[[paths]]
path = ".vscode/settings.json"
description = "VSCode workspace settings"
content_patterns = ["\"editor\\.", "\"workbench\\.", "\"files\\."]

[[paths]]
path = ".idea/workspace.xml"
description = "JetBrains workspace configuration"
content_patterns = ["<\\?xml", "<project\\s+", "<component\\s+name="]

[[paths]]
path = "robots.txt"
description = "robots.txt crawl directives"
content_patterns = ["^User-agent\\s*:", "^Disallow\\s*:", "^Allow\\s*:", "^Sitemap\\s*:"]

[[paths]]
path = "sitemap.xml"
description = "XML sitemap"
content_patterns = ["<\\?xml", "<urlset", "<sitemapindex"]

[[paths]]
path = "security.txt"
description = "security.txt disclosure policy"
content_patterns = ["^Contact\\s*:", "^Expires\\s*:", "^Encryption\\s*:"]

[[paths]]
path = ".well-known/security.txt"
description = "well-known security.txt"
content_patterns = ["^Contact\\s*:", "^Expires\\s*:"]

[[paths]]
path = "phpinfo.php"
description = "phpinfo() output"
content_patterns = ["<title>phpinfo\\(\\)", "PHP Version", "phpinfo\\(\\)"]

[[paths]]
path = "info.php"
description = "phpinfo() output (alternate name)"
content_patterns = ["<title>phpinfo\\(\\)", "PHP Version"]

[[paths]]
path = "server-status"
description = "Apache server-status page"
content_patterns = ["<title>Apache Status", "Server uptime", "<h1>Apache Server Status"]

[[paths]]
path = "server-info"
description = "Apache server-info page"
content_patterns = ["<title>Server Information", "<h1>Apache Server Information"]

[[paths]]
path = "adminer.php"
description = "Adminer database management tool"
content_patterns = ["<title>Login", "name=\"auth\\[server\\]\"", "Adminer"]

[[paths]]
path = "phpmyadmin/"
description = "phpMyAdmin web interface"
content_patterns = ["phpMyAdmin", "name=\"pma_username\"", "<title>phpMyAdmin"]

[[paths]]
path = "backup/"
description = "Backup directory listing"
content_patterns = ["<title>Index of /backup", "Parent Directory"]

[[paths]]
path = "backups/"
description = "Backups directory listing"
content_patterns = ["<title>Index of /backups", "Parent Directory"]

[[paths]]
path = "ftp/"
description = "FTP directory listing"
content_patterns = ["<title>Index of /ftp", "Parent Directory"]

[[paths]]
path = "dump.sql"
description = "SQL database dump"
content_patterns = ["CREATE TABLE", "INSERT INTO", "-- MySQL dump", "-- PostgreSQL database dump"]

[[paths]]
path = "database.sql"
description = "SQL database file"
content_patterns = ["CREATE TABLE", "INSERT INTO"]

[[paths]]
path = "debug.log"
description = "Application debug log"
content_patterns = ["DEBUG", "ERROR", "WARN", "\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2}"]

[[paths]]
path = ".npmrc"
description = "npm configuration file"
content_patterns = ["registry\\s*=", "_authToken\\s*=", "//.*:_authToken"]
severity_if_protected = "high"

[[paths]]
path = ".pypirc"
description = "Python package index credentials"
content_patterns = ["\\[pypi\\]", "username\\s*=", "password\\s*="]
severity_if_protected = "high"

[[paths]]
path = ".pip/pip.conf"
description = "pip configuration file"
content_patterns = ["\\[global\\]", "index-url\\s*="]
