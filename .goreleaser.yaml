version: 2

project_name: suri

builds:
  - id: suri
    main: ./cmd/suri
    binary: suri
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: windows
        goarch: arm64

archives:
  - id: suri
    ids:
      - suri
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - WORDLISTS.md
      - IMPROVEMENTS.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

homebrew_casks:
  - name: suri
    ids:
      - suri
    binaries:
      - suri
    homepage: "https://github.com/osintph/suri"
    description: "Web application security scanner for authorized VAPT engagements"
    repository:
      owner: osintph
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
